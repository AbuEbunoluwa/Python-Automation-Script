<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Essentials Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 0; }
        .product-card { transition: transform 0.2s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-5px); }
        .badge-category { font-size: 0.8rem; background-color: #e2e8f0; color: #4a5568; }
    </style>
</head>
<body>

<div class="hero text-center mb-5">
    <h1>🏠 Home Essentials Marketplace</h1>
    <p>Everything for your Living Room, Kitchen, and more!</p>
</div>

<div class="container">
    <div class="row" id="product-grid">
        <!-- Products will be injected here by JS -->
    </div>
</div>

<script>
    async function fetchProducts() {
        try {
            // In K8s, this will eventually be your Service DNS or Ingress URL
            const response = await fetch('http://localhost:8000/products');
            const products = await response.json();
            const grid = document.getElementById('product-grid');

            grid.innerHTML = products.map(p => `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 product-card">
                        <div class="card-body">
                            <span class="badge badge-category mb-2">${p.category}</span>
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text text-primary fw-bold">$${p.price}</p>
                            <button class="btn btn-outline-dark btn-sm w-100" onclick="checkout(${p.id})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error("Error fetching products:", err);
        }
    }

    async function checkout(id) {
        const email = "customer@example.com";
        const response = await fetch('http://localhost:8000/checkout', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ product_ids: [id], customer_email: email })
        });
        const result = await response.json();
        alert(result.message + " Total: $" + result.total);
    }

    fetchProducts();
</script>
</body>
</html>
